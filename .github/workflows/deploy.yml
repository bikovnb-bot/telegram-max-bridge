name: Test and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/telegram-max-bridge
            git fetch origin
            git reset --hard origin/main
            chown -R bridge:bridge bridge requirements.txt deploy README.md .gitignore .env.example .git
            sudo -u bridge /opt/telegram-max-bridge/.venv/bin/pip install -q -r requirements.txt
            systemctl restart telegram-max-bridge
            systemctl restart telegram-max-bridge-web
            sleep 2
            systemctl is-active telegram-max-bridge telegram-max-bridge-web
